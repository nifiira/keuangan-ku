<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laporan Keuangan Bulanan</title>
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body>
    <div class="header">
      <h2>Laporan Keuangan Bulanan</h2>
      <div>
        <span id="userInfo"></span>
        <button id="loginBtn" class="btn-google">Login with Google</button>
        <button id="logoutBtn" style="display: none; background-color: #6c757d">
          Logout
        </button>
      </div>
    </div>

    <div id="filter-section" class="filter-container">
      <label>Rentang Waktu:</label>
      <select id="filter-type">
        <option value="semua">Semua Transaksi</option>
        <option value="harian">Harian (Pilih Tanggal)</option>
        <option value="bulanan">Bulanan (Pilih Bulan)</option>
      </select>
      <input type="date" id="filter-date" style="display: none" />
      <input type="month" id="filter-month" style="display: none" />
    </div>

    <div id="summary-section" class="summary-container">
      <div class="summary-card bg-income">
        <h4>Total Pendapatan</h4>
        <p id="tot-pendapatan">Rp0</p>
      </div>
      <div class="summary-card bg-expense">
        <h4>Total Pengeluaran</h4>
        <p id="tot-pengeluaran">Rp0</p>
      </div>
      <div class="summary-card bg-plan">
        <h4>Total Rencana</h4>
        <p id="tot-rencana">Rp0</p>
      </div>
      <div class="summary-card bg-balance-real">
        <h4>Sisa (Pendapatan - Pengeluaran)</h4>
        <p id="tot-sisa-pengeluaran">Rp0</p>
      </div>
      <div class="summary-card bg-balance-plan">
        <h4>Sisa (Pendapatan - Rencana)</h4>
        <p id="tot-sisa-rencana">Rp0</p>
      </div>
    </div>

    <div id="app-content" class="grid-container">
      <div class="card">
        <h3>Pendapatan</h3>
        <div class="form-group">
          <input type="date" id="date-pendapatan" required />
          <input
            type="number"
            id="nom-pendapatan"
            placeholder="Nominal"
            required
          />
          <input
            type="text"
            id="ket-pendapatan"
            placeholder="Uraian"
            required
          />
          <select id="kat-pendapatan">
            <option value="Gaji">Gaji</option>
            <option value="Freelance">Freelance</option>
            <option value="Bonus">Bonus</option>
            <option value="Investasi">Investasi</option>
            <option value="Withdrawal">Withdrawal</option>
            <option value="Lainnya">Lainnya</option>
          </select>
          <button onclick="tambahData('pendapatan')">Tambah</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Tanggal</th>
              <th>Nominal</th>
              <th>Uraian</th>
              <th>Kategori</th>
            </tr>
          </thead>
          <tbody id="table-pendapatan"></tbody>
        </table>
      </div>

      <div class="card">
        <h3>Pengeluaran</h3>
        <div class="form-group">
          <input type="date" id="date-pengeluaran" required />
          <input
            type="number"
            id="nom-pengeluaran"
            placeholder="Nominal"
            required
          />
          <input
            type="text"
            id="ket-pengeluaran"
            placeholder="Uraian"
            required
          />
          <select id="kat-pengeluaran">
            <option value="Tagihan">Tagihan</option>
            <option value="Cash">Cash</option>
            <option value="Savings">Savings</option>
            <option value="Transfer">Transfer</option>
            <option value="Deposit">Deposit</option>
            <option value="Lainnya">Lainnya</option>
          </select>
          <button onclick="tambahData('pengeluaran')">Tambah</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Tanggal</th>
              <th>Nominal</th>
              <th>Uraian</th>
              <th>Kategori</th>
            </tr>
          </thead>
          <tbody id="table-pengeluaran"></tbody>
        </table>
      </div>

      <div class="card">
        <h3>Rencana Pengeluaran</h3>
        <div class="form-group">
          <input type="date" id="date-rencana" required />
          <input
            type="number"
            id="nom-rencana"
            placeholder="Nominal"
            required
          />
          <input type="text" id="ket-rencana" placeholder="Uraian" required />
          <select id="kat-rencana">
            <option value="Tagihan">Tagihan</option>
            <option value="Cash">Cash</option>
            <option value="Savings">Savings</option>
            <option value="Transfer">Transfer</option>
            <option value="Deposit">Deposit</option>
            <option value="Lainnya">Lainnya</option>
          </select>
          <button onclick="tambahData('rencana')">Tambah</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Tanggal</th>
              <th>Nominal</th>
              <th>Uraian</th>
            </tr>
          </thead>
          <tbody id="table-rencana"></tbody>
        </table>
      </div>
    </div>
    <script type="module" src="assets/js/main.js"></script>
  </body>
</html>
